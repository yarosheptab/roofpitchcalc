<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#1B1814"/>

  <!-- Horizontal baseline -->
  <line x1="6" y1="25" x2="26" y2="25" stroke="#FDFCF8" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Diagonal line — ~35° pitch -->
  <line x1="6" y1="25" x2="22" y2="13" stroke="#FDFCF8" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Angle arc (brick red) — sweeps from horizontal to diagonal -->
  <path d="M 15,25 A 9,9 0 0,0 13.4,19.8" stroke="#C0391E" stroke-width="1.75" fill="none" stroke-linecap="round"/>

  <!-- Corner anchor dot -->
  <circle cx="6" cy="25" r="1.5" fill="#FDFCF8"/>

  <!-- Tick at end of horizontal -->
  <line x1="26" y1="22.5" x2="26" y2="27.5" stroke="#FDFCF8" stroke-width="1.25" stroke-linecap="round"/>

  <!-- Tick at end of diagonal (perpendicular to it) -->
  <line x1="20.3" y1="11.9" x2="23.7" y2="14.1" stroke="#FDFCF8" stroke-width="1.25" stroke-linecap="round"/>
</svg>
